name: Playwright Tests — Full CI Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test (chromium / firefox / webkit / all)'
        required: false
        default: 'all'

env:
  NODE_VERSION: '20'

jobs:
  # ── JOB 1: Install & cache dependencies ──────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install webapp dependencies
        run: cd webapp && npm ci

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

  # ── JOB 2: Run tests in parallel shards ──────────────────────────────────
  test:
    name: Test (${{ matrix.project }}, shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false   # run all shards even if one fails
      matrix:
        project: [chromium, firefox, webkit]
        shardIndex: [1, 2]
        shardTotal: [2]
        exclude:
          # Only shard chromium — firefox and webkit are fast enough
          - project: firefox
            shardIndex: 2
          - project: webkit
            shardIndex: 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd webapp && npm ci

      - name: Restore cached browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install browser deps (system libraries)
        run: npx playwright install-deps ${{ matrix.project }}

      - name: Run tests
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.project }}-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

  # ── JOB 3: Merge reports from all shards ─────────────────────────────────
  merge-reports:
    name: Merge test reports
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 30

  # ── JOB 4: Post summary comment on PRs ───────────────────────────────────
  comment:
    name: Post test summary
    runs-on: ubuntu-latest
    needs: merge-reports
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.test.result }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const body = `## ${emoji} Playwright Test Results

            **Status:** ${status}
            **Trigger:** \`${{ github.event_name }}\`
            **Branch:** \`${{ github.head_ref }}\`

            [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
